name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        type: string
      release_notes:
        description: '更新说明（功能更新 / Bug 修复）'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate changelog
        id: changelog
        run: |
          git fetch --tags
          PREV_TAG=$(git tag --sort=-creatordate | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' --no-merges)
          fi
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set version
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Build
        run: mvn clean package -DskipTests

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ${{ inputs.release_notes }}

            ## 提交记录
            ${{ steps.changelog.outputs.changelog }}
          files: |
            ai-router-standalone/target/ai-router-standalone-${{ inputs.version }}.jar
            ai-router-saas/target/ai-router-saas-${{ inputs.version }}.jar
